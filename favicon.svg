<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a0d00"/>
      <stop offset="60%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#0d0400"/>
    </radialGradient>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="25%" stop-color="#ffec6e"/>
      <stop offset="50%" stop-color="#c8960c"/>
      <stop offset="75%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#e8171e"/>
      <stop offset="30%" stop-color="#ff4500"/>
      <stop offset="65%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="innerFlame" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#ff6b1a"/>
      <stop offset="100%" stop-color="#fff176"/>
    </linearGradient>
    <radialGradient id="bunTop" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e8870a"/>
      <stop offset="50%" stop-color="#c86400"/>
      <stop offset="100%" stop-color="#8b3e00"/>
    </radialGradient>
    <radialGradient id="bunBot" cx="45%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#d4730a"/>
      <stop offset="100%" stop-color="#7a3500"/>
    </radialGradient>
    <linearGradient id="pattyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c2d0a"/>
      <stop offset="50%" stop-color="#3d1a05"/>
      <stop offset="100%" stop-color="#2a1005"/>
    </linearGradient>
    <linearGradient id="cheeseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ffa500"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="flameGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <circle cx="256" cy="256" r="248" fill="url(#bgGrad)"/>

  <!-- OUTER GOLD RING -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#goldRing)" stroke-width="8"/>
  <circle cx="256" cy="256" r="236" fill="none" stroke="url(#goldRing)" stroke-width="2" opacity="0.4"/>

  <!-- GOLD DOTS ON RING -->
  <circle cx="256" cy="10" r="5" fill="#ffd700" opacity="0.8"/>
  <circle cx="256" cy="502" r="5" fill="#ffd700" opacity="0.8"/>
  <circle cx="10" cy="256" r="5" fill="#ffd700" opacity="0.8"/>
  <circle cx="502" cy="256" r="5" fill="#ffd700" opacity="0.8"/>
  <circle cx="79" cy="79" r="4" fill="#ffd700" opacity="0.8"/>
  <circle cx="433" cy="79" r="4" fill="#ffd700" opacity="0.8"/>
  <circle cx="79" cy="433" r="4" fill="#ffd700" opacity="0.8"/>
  <circle cx="433" cy="433" r="4" fill="#ffd700" opacity="0.8"/>

  <!-- LEFT FLAME -->
  <g filter="url(#flameGlow)">
    <path d="M148 340 C135 310 140 285 155 265 C148 280 160 290 158 275 C165 255 175 248 172 230 C180 248 172 262 178 272 C182 255 188 245 185 228 C196 250 192 268 196 280 C200 265 204 252 200 238 C212 258 210 275 208 288 C215 272 220 258 216 242 C228 268 222 288 218 304 C225 290 232 278 228 262 C238 282 232 300 230 316 C235 305 240 294 237 282 C244 298 238 318 234 334 L148 340Z" fill="url(#flameGrad)" opacity="0.9"/>
    <path d="M170 335 C162 315 165 298 174 282 C169 292 177 298 176 288 C181 275 188 270 186 258 C192 270 186 280 190 286 C194 275 198 268 196 258 C204 272 202 284 202 292 C206 282 208 273 206 263 C213 276 210 288 209 296 L170 335Z" fill="url(#innerFlame)" opacity="0.8"/>
  </g>

  <!-- RIGHT FLAME -->
  <g filter="url(#flameGlow)">
    <path d="M364 340 C377 310 372 285 357 265 C364 280 352 290 354 275 C347 255 337 248 340 230 C332 248 340 262 334 272 C330 255 324 245 327 228 C316 250 320 268 316 280 C312 265 308 252 312 238 C300 258 302 275 304 288 C297 272 292 258 296 242 C284 268 290 288 294 304 C287 290 280 278 284 262 C274 282 280 300 282 316 C277 305 272 294 275 282 C268 298 274 318 278 334 L364 340Z" fill="url(#flameGrad)" opacity="0.9"/>
    <path d="M342 335 C350 315 347 298 338 282 C343 292 335 298 336 288 C331 275 324 270 326 258 C320 270 326 280 322 286 C318 275 314 268 316 258 C308 272 310 284 310 292 C306 282 304 273 306 263 C299 276 302 288 303 296 L342 335Z" fill="url(#innerFlame)" opacity="0.8"/>
  </g>

  <!-- BUN TOP -->
  <g filter="url(#softShadow)">
    <ellipse cx="256" cy="210" rx="130" ry="82" fill="url(#bunTop)"/>
    <ellipse cx="220" cy="180" rx="10" ry="5" fill="#c86400" transform="rotate(-20,220,180)"/>
    <ellipse cx="256" cy="165" rx="10" ry="5" fill="#c86400" transform="rotate(5,256,165)"/>
    <ellipse cx="292" cy="178" rx="10" ry="5" fill="#c86400" transform="rotate(15,292,178)"/>
    <ellipse cx="235" cy="196" rx="8" ry="4" fill="#c86400" transform="rotate(-10,235,196)"/>
    <ellipse cx="275" cy="194" rx="8" ry="4" fill="#c86400" transform="rotate(10,275,194)"/>
    <ellipse cx="220" cy="178" rx="4" ry="2" fill="#e8870a" transform="rotate(-20,220,178)" opacity="0.6"/>
    <ellipse cx="256" cy="163" rx="4" ry="2" fill="#e8870a" transform="rotate(5,256,163)" opacity="0.6"/>
    <ellipse cx="292" cy="176" rx="4" ry="2" fill="#e8870a" transform="rotate(15,292,176)" opacity="0.6"/>
    <ellipse cx="220" cy="192" rx="55" ry="22" fill="#ff9a2a" opacity="0.18"/>
  </g>

  <!-- LETTUCE -->
  <path d="M118 278 Q140 265 160 272 Q180 260 200 268 Q220 255 240 264 Q260 252 280 261 Q300 250 320 258 Q340 248 360 256 Q380 248 394 260 L394 278 Q380 272 360 280 Q340 274 320 284 Q300 276 280 286 Q260 278 240 288 Q220 280 200 290 Q180 282 160 292 Q140 284 118 278Z" fill="#4caf50"/>

  <!-- TOMATO -->
  <ellipse cx="200" cy="290" rx="28" ry="10" fill="#e53935" opacity="0.9"/>
  <ellipse cx="256" cy="290" rx="28" ry="10" fill="#e53935" opacity="0.9"/>
  <ellipse cx="312" cy="290" rx="28" ry="10" fill="#e53935" opacity="0.9"/>
  <ellipse cx="200" cy="290" rx="20" ry="7" fill="#ef9a9a" opacity="0.5"/>
  <ellipse cx="256" cy="290" rx="20" ry="7" fill="#ef9a9a" opacity="0.5"/>
  <ellipse cx="312" cy="290" rx="20" ry="7" fill="#ef9a9a" opacity="0.5"/>

  <!-- CHEESE -->
  <path d="M120 302 L392 302 L400 316 L118 316 Z" fill="url(#cheeseGrad)" opacity="0.95"/>
  <path d="M140 316 Q136 326 142 330 Q148 334 144 316Z" fill="#ffcc00"/>
  <path d="M372 316 Q376 326 370 330 Q364 334 368 316Z" fill="#ffa500"/>

  <!-- PATTY -->
  <g filter="url(#softShadow)">
    <rect x="115" y="316" width="282" height="42" rx="14" fill="url(#pattyGrad)"/>
    <line x1="150" y1="320" x2="165" y2="354" stroke="#2a1005" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <line x1="185" y1="320" x2="200" y2="354" stroke="#2a1005" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <line x1="220" y1="320" x2="235" y2="354" stroke="#2a1005" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <line x1="255" y1="320" x2="270" y2="354" stroke="#2a1005" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <line x1="290" y1="320" x2="305" y2="354" stroke="#2a1005" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <line x1="325" y1="320" x2="340" y2="354" stroke="#2a1005" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <rect x="115" y="316" width="282" height="8" rx="14" fill="#7a4010" opacity="0.5"/>
  </g>

  <!-- BUN BOTTOM -->
  <g filter="url(#softShadow)">
    <ellipse cx="256" cy="368" rx="133" ry="30" fill="url(#bunBot)"/>
    <ellipse cx="230" cy="358" rx="60" ry="10" fill="#e8870a" opacity="0.15"/>
  </g>

  <!-- BRAND TEXT -->
  <text x="256" y="436"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52" font-weight="900"
        fill="url(#goldRing)"
        text-anchor="middle"
        letter-spacing="6"
        filter="url(#softShadow)">FOODS</text>
  <text x="256" y="482"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="34" font-weight="700"
        fill="#ff6b1a"
        text-anchor="middle"
        letter-spacing="4"
        filter="url(#softShadow)">CARNIVAL</text>

  <!-- STAR SPARK -->
  <polygon points="256,108 260,120 272,120 262,128 266,140 256,132 246,140 250,128 240,120 252,120" fill="#ffd700" filter="url(#flameGlow)"/>

  <!-- GLOW RING -->
  <ellipse cx="256" cy="290" rx="145" ry="100" fill="none" stroke="#ff6b1a" stroke-width="3" opacity="0.12"/>
</svg>

